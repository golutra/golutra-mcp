name: Feature request
description: Suggest a new capability or integration improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or tool behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe other approaches you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include example workflows, MCP clients, or Golutra commands when relevant.
