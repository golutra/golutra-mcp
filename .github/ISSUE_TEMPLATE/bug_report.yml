name: Bug report
description: Report a reproducible defect in golutra-mcp
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include exact commands, environment details, and reproducible steps.
  - type: input
    id: version
    attributes:
      label: Version
      description: Which golutra-mcp version are you using?
      placeholder: 0.1.x
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, Golutra app version, and golutra-cli location.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide exact steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or payloads
      description: Paste stderr output, MCP payloads, or golutra-cli JSON output if available.
